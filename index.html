<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Office Bomb Launch: Back to Office</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { background: linear-gradient(to bottom, #87CEEB 0%, #f5f5f5 100%); }
        
        #ui { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.7); padding: 12px; border-radius: 5px;
            width: 280px; font-size: 13px; pointer-events: none;
        }
        .guide-title { color: #f1c40f; font-weight: bold; border-bottom: 1px solid #555; margin-bottom: 5px; }
        .key { background: #555; padding: 1px 4px; border-radius: 3px; }
        
        #dist-ui { position: absolute; right: 20px; top: 20px; font-size: 32px; color: #2c3e50; font-weight: bold; }
        #msg { position: absolute; width: 100%; text-align: center; top: 35%; font-size: 30px; font-weight: bold; text-shadow: 2px 2px #fff; color: #333; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="guide-title">■ 操作ガイド</div>
        1. <span class="key">Space</span>: 角度決定 & パワー溜め<br>
        2. <span class="key">Shift</span>: 空中ブースト (燃料制)<br>
        3. <span class="key">Space</span>: 着地寸前に押してバウンド！<br>
        <div class="guide-title" style="color:#e74c3c; margin-top:8px;">■ 特殊兵装</div>
        4. <span class="key">E</span>: <b>背中爆弾起爆！</b> (1回限り)<br>
        <small>回転中に起爆しろ！背中の向きに吹っ飛ぶぞ！</small>
    </div>
    
    <div id="dist-ui"><span id="dist-val">0</span> m</div>
    <div id="msg">SPACEで角度決定</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const distVal = document.getElementById('dist-val');
const msgDisplay = document.getElementById('msg');

canvas.width = 900;
canvas.height = 500;

let gameState = 'angle'; 
let anglePos = 0;
let selectedAngle = 0;
let launchPower = 0;
let fuel = 100;
let cameraX = 0;
let bombAvailable = true;
let particles = [];

let player = { x: 100, y: 440, vx: 0, vy: 0, rotation: 0, rotVel: 0 };
const floorY = 460;

// オフィス背景の装飾
const decorations = [];
for(let i=0; i<100; i++) {
    decorations.push({
        x: 300 + i * 400 + Math.random() * 200,
        type: Math.random() > 0.5 ? 'desk' : 'water',
        color: Math.random() > 0.5 ? '#d35400' : '#3498db'
    });
}

const keys = {};
window.addEventListener('keydown', e => {
    if(e.code === 'Space' && gameState !== 'power') handleSpaceAction();
    if(e.code === 'KeyE') detonateBomb();
    keys[e.code] = true;
});
window.addEventListener('keyup', e => {
    if(e.code === 'Space' && gameState === 'power') launch();
    keys[e.code] = false;
});

function handleSpaceAction() {
    if (gameState === 'angle') {
        selectedAngle = (Math.sin(anglePos) * 60 - 30) * (Math.PI / 180);
        gameState = 'power';
        msgDisplay.innerText = "POWER CHARGE!!";
    } else if (gameState === 'flying') {
        checkBounce();
    } else if (gameState === 'result') {
        resetGame();
    }
}

function launch() {
    gameState = 'flying';
    player.vx = Math.cos(selectedAngle) * (launchPower / 3 + 5);
    player.vy = Math.sin(selectedAngle) * (launchPower / 3 + 5);
    player.rotVel = player.vx * 0.03; // 速度に応じて回転
    msgDisplay.innerText = "";
}

function detonateBomb() {
    if (gameState === 'flying' && bombAvailable) {
        bombAvailable = false;
        const force = 28;
        // 背中の方向（rotation）に力を加える
        player.vx += Math.cos(player.rotation) * force;
        player.vy += Math.sin(player.rotation) * force;
        player.rotVel += 0.4; // 爆発で回転が加速

        // 爆発パーティクル
        for(let i=0; i<40; i++) {
            particles.push({
                x: player.x, y: player.y, 
                vx: (Math.random()-0.5)*25, vy: (Math.random()-0.5)*25, 
                life: 1, color: '#ff4500'
            });
        }
        msgDisplay.innerText = "KABOOOOM!!";
        setTimeout(() => { if(gameState==='flying') msgDisplay.innerText=""; }, 800);
    }
}

function checkBounce() {
    if (player.y > floorY - 60 && player.vy > 0) {
        player.vy = -player.vy * 1.35;
        player.vx *= 1.2;
        msgDisplay.innerText = "PERFECT!!";
        setTimeout(() => { if(gameState==='flying') msgDisplay.innerText=""; }, 500);
    }
}

function resetGame() {
    gameState = 'angle'; anglePos = 0; launchPower = 0; fuel = 100; cameraX = 0;
    bombAvailable = true;
    player = { x: 100, y: 440, vx: 0, vy: 0, rotation: 0, rotVel: 0 };
    msgDisplay.innerText = "SPACEで角度決定";
}

function update() {
    if (gameState === 'angle') {
        anglePos += 0.06;
        selectedAngle = (Math.sin(anglePos) * 60 - 30) * (Math.PI / 180);
    }
    if (gameState === 'power') {
        launchPower = Math.min(launchPower + 2.5, 100);
    }
    if (gameState === 'flying') {
        player.vy += 0.25;
        player.vx *= 0.994;
        player.x += player.vx;
        player.y += player.vy;
        player.rotation += player.rotVel;

        if (keys['ShiftLeft'] && fuel > 0) {
            player.vx += 0.25;
            fuel -= 1.5;
            particles.push({x: player.x, y: player.y, vx: -4, vy: Math.random(), life: 0.5, color: '#fff'});
        }

        if (player.y > floorY - 20) {
            player.y = floorY - 20;
            player.vy *= -0.4;
            player.vx *= 0.85;
            player.rotVel *= 0.6;
            if (Math.abs(player.vx) < 0.5) {
                gameState = 'result';
                msgDisplay.innerHTML = `記録: ${Math.floor(player.x/10)}m<br><span style="font-size:16px">Spaceでリトライ</span>`;
            }
        }
        cameraX = player.x - 200;
        distVal.innerText = Math.floor(player.x / 10);
    }
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // 地面（オフィス床）
    ctx.fillStyle = '#95a5a6';
    ctx.fillRect(cameraX, floorY, canvas.width, 40);

    // デコレーション描画（デスクなど）
    decorations.forEach(d => {
        if (d.x > cameraX - 100 && d.x < cameraX + canvas.width + 100) {
            ctx.fillStyle = d.color;
            ctx.fillRect(d.x, floorY - 40, 70, 40);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '10px Arial';
            ctx.fillText(d.type.toUpperCase(), d.x + 10, floorY - 15);
        }
    });

    // 角度ガイド
    if (gameState === 'angle' || gameState === 'power') {
        ctx.beginPath();
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 3;
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(selectedAngle)*80, player.y + Math.sin(selectedAngle)*80);
        ctx.stroke();
    }

    // プレイヤー
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rotation);
    
    // 背中の爆弾
    if(bombAvailable) {
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.arc(-16, 0, 9, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#333'; ctx.fillRect(-18, -12, 4, 4);
    }

    // 椅子と人
    ctx.fillStyle = '#333'; ctx.fillRect(-15, 8, 30, 6);
    ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(0, -6, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2980b9'; ctx.fillRect(-10, 6, 20, 10);
    ctx.restore();

    // パーティクル
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
