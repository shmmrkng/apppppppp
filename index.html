<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Office Chair Rocket: Speedrun</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #444; }
        canvas { background: linear-gradient(to bottom, #2c3e50 0%, #000 100%); }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: none; min-width: 200px; }
        .gauge-bar { width: 100%; height: 12px; background: #333; border: 1px solid #555; margin: 4px 0 10px; }
        #power-fill { width: 0%; height: 100%; background: #e74c3c; }
        #fuel-fill { width: 100%; height: 100%; background: #3498db; }
        #msg { position: absolute; width: 100%; text-align: center; top: 30%; font-size: 28px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px #000; }
        .controls { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div>距離: <span id="dist">0</span>m</div>
        <div class="controls">POWER (Space長押し)</div>
        <div class="gauge-bar"><div id="power-fill"></div></div>
        <div class="controls">FUEL (空中Shift / クリック)</div>
        <div class="gauge-bar"><div id="fuel-fill"></div></div>
        <div id="combo" style="color: #f1c40f; font-weight: bold;"></div>
    </div>
    <div id="msg">SPACE長押しで射出！</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const powerFill = document.getElementById('power-fill');
const fuelFill = document.getElementById('fuel-fill');
const distDisplay = document.getElementById('dist');
const msgDisplay = document.getElementById('msg');
const comboDisplay = document.getElementById('combo');

canvas.width = 900;
canvas.height = 500;

let state = 'ready'; 
let power = 0;
let fuel = 100;
let cameraX = 0;
let particles = [];

let player = {
    x: 100, y: 440, vx: 0, vy: 0, 
    radius: 18, rotation: 0, rotationVel: 0
};

// ギミック配置
const floorY = 460;
const assets = [];
for(let i=0; i<100; i++) {
    assets.push({
        x: 500 + i * 400 + Math.random() * 200,
        type: Math.random() > 0.8 ? 'boost' : 'paper'
    });
}

const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'Space') {
        if(state === 'ready') state = 'charging';
        if(state === 'flying') checkPerfectBounce();
        if(state === 'result') reset();
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', () => keys['Mouse'] = true);
window.addEventListener('mouseup', () => keys['Mouse'] = false);

function checkPerfectBounce() {
    // 床に近い時にSpaceを押すと高く跳ねる
    if (player.y > floorY - 50 && player.vy > 0) {
        player.vy = -player.vy * 1.2;
        player.vx *= 1.1;
        showFloatingText("PERFECT BOUNCE!!", "#f1c40f");
    }
}

function showFloatingText(txt, color) {
    comboDisplay.innerText = txt;
    comboDisplay.style.color = color;
    setTimeout(() => comboDisplay.innerText = "", 1000);
}

function reset() {
    state = 'ready'; power = 0; fuel = 100; cameraX = 0;
    player = { x: 100, y: 440, vx: 0, vy: 0, radius: 18, rotation: 0, rotationVel: 0 };
    msgDisplay.innerText = "SPACE長押しで射出！";
}

function createSmoke(x, y, vx, vy) {
    for(let i=0; i<3; i++) {
        particles.push({x, y, vx: vx + (Math.random()-0.5), vy: vy + (Math.random()-0.5), life: 1, size: Math.random()*10+5});
    }
}

function update() {
    if (state === 'charging') {
        power = Math.min(power + 1.5, 100);
        powerFill.style.width = power + '%';
        if (!keys['Space']) {
            state = 'flying';
            player.vx = (power / 4) + 5;
            player.vy = -(power / 4) - 5;
            player.rotationVel = 0.2;
            msgDisplay.innerText = "";
        }
    }

    if (state === 'flying') {
        // 空中ブースト (Shift または マウス)
        if ((keys['ShiftLeft'] || keys['Mouse']) && fuel > 0) {
            player.vx += 0.4;
            player.vy -= 0.1;
            fuel -= 1.5;
            createSmoke(player.x - 20, player.y + 10, -5, 2);
        }
        fuelFill.style.width = fuel + '%';

        player.vy += 0.25; // 重力
        player.vx *= 0.99; // 空気抵抗
        player.x += player.vx;
        player.y += player.vy;
        player.rotation += player.vx * 0.05;

        // 床判定
        if (player.y + player.radius > floorY) {
            player.y = floorY - player.radius;
            player.vy *= -0.5; // 通常バウンド
            player.vx *= 0.9;
            if(Math.abs(player.vx) < 0.5) {
                state = 'result';
                msgDisplay.innerHTML = `記録: ${Math.floor(player.x/10)}m<br><span style="font-size:16px">Spaceでリトライ</span>`;
            }
        }

        // ギミック判定
        assets.forEach(a => {
            if(!a.hit && Math.abs(player.x - a.x) < 40 && Math.abs(player.y - floorY) < 50) {
                if(a.type === 'boost') {
                    player.vx += 15;
                    showFloatingText("BOOST!!!", "#2ecc71");
                }
                a.hit = true;
            }
        });

        cameraX = player.x - 200;
        distDisplay.innerText = Math.floor(player.x / 10);
    }

    // パーティクル更新
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // 床
    ctx.fillStyle = '#333';
    ctx.fillRect(cameraX, floorY, canvas.width, 40);
    for(let i=0; i<20; i++) {
        ctx.strokeStyle = '#444';
        let lineX = Math.floor(cameraX/100)*100 + i*100;
        ctx.strokeRect(lineX, floorY, 100, 40);
    }

    // ギミック描画
    assets.forEach(a => {
        if(a.type === 'boost') {
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(a.x, floorY - 5, 60, 5);
        } else {
            ctx.fillStyle = '#fff';
            ctx.fillRect(a.x, floorY - 10, 15, 20);
        }
    });

    // パーティクル
    particles.forEach(p => {
        ctx.fillStyle = `rgba(200, 200, 200, ${p.life})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });

    // プレイヤー（椅子と人）
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rotation);
    // 消火器
    ctx.fillStyle = '#e74c3c'; ctx.fillRect(-20, 5, 25, 10);
    // 椅子
    ctx.fillStyle = '#555'; ctx.fillRect(-15, 10, 30, 5);
    ctx.fillRect(-2, 15, 4, 10);
    // 人
    ctx.fillStyle = '#f39c12'; ctx.beginPath(); ctx.arc(0, -5, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillRect(-8, 5, 16, 10);
    ctx.restore();

    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
