<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Extreme Office Launch</title>
    <style>
        /* 全体設定 */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; /* 深い青の背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ecf0f1;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #7f8c8d, #34495e); /* 空と遠景 */
            border: 5px solid #bdc3c7;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* UI要素 */
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 200px;
            text-align: center;
            border: 1px solid #3498db;
        }
        #ui div {
            font-size: 1.1em;
            font-weight: bold;
            color: #ecf0f1;
        }
        #message {
            font-size: 1.5em;
            color: #e74c3c;
            animation: pulse 1.5s infinite alternate;
        }
        #distance-display {
            font-size: 1.8em;
            color: #2ecc71;
        }
        #gas-gauge-container {
            width: 100%;
            height: 15px;
            background-color: #555;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        #gas-gauge {
            height: 100%;
            width: 100%;
            background-color: #f1c40f;
            transition: width 0.1s linear;
        }

        /* 発射角度ゲージ */
        #angle-indicator {
            position: absolute;
            bottom: 50px;
            left: 10%;
            width: 150px;
            height: 150px;
            border: 2px solid #3498db;
            border-radius: 50%;
            z-index: 15;
            opacity: 0; /* 初期は非表示 */
            transition: opacity 0.3s ease;
            transform-origin: center center;
            background: rgba(0, 0, 0, 0.5);
        }
        #angle-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 4px;
            background-color: #e74c3c;
            transform-origin: 0% 50%;
            transform: rotate(0deg);
        }
        #angle-indicator.active {
            opacity: 1;
        }

        /* 最終リザルト画面 */
        #result-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: none; /* 初期は非表示 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ecf0f1;
            font-size: 2em;
        }
        #result-screen.active {
            display: flex;
        }
        #final-distance {
            font-size: 3em;
            color: #2ecc71;
            margin: 20px 0;
        }
        #retry-button {
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }
        #retry-button:hover {
            background-color: #c0392b;
        }

        /* キーボードヒント */
        #key-hints {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #bdc3c7;
            border: 1px solid #7f8c8d;
        }

        /* 背景オブジェクト */
        .background-object {
            position: absolute;
            background-color: #7f8c8d;
            border-radius: 5px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            z-index: 5;
            opacity: 0.8;
        }
        .desk {
            width: 150px;
            height: 80px;
            background-color: #95a5a6;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            border-radius: 5px 5px 0 0;
            left: 50px;
            bottom: 100px;
        }
        .monitor {
            width: 60px;
            height: 50px;
            background-color: #2c3e50;
            border-radius: 3px;
            left: 70px;
            bottom: 180px;
            transform: rotate(-5deg);
        }
        .plant {
            width: 40px;
            height: 60px;
            background-color: #27ae60;
            border-radius: 50% 50% 0 0;
            left: 200px;
            bottom: 100px;
            background-image: radial-gradient(circle at 10px 10px, #2ecc71 10%, transparent 10%),
                              radial-gradient(circle at 30px 20px, #2ecc71 10%, transparent 10%);
        }
        .plant::before {
            content: '';
            position: absolute;
            width: 15px;
            height: 30px;
            background-color: #7f8c8d;
            bottom: -30px;
            left: 12.5px;
            border-radius: 0 0 5px 5px;
        }

        /* アニメーション */
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div id="message">準備完了！SPACEで発射</div>
            <div id="distance-display">飛距離: 0.00m</div>
            <div>ガス残量: <div id="gas-gauge-container"><div id="gas-gauge"></div></div></div>
        </div>

        <div id="angle-indicator">
            <div id="angle-arrow"></div>
        </div>

        <div id="result-screen">
            <h1>ミッション完了！</h1>
            <p>最終飛距離:</p>
            <div id="final-distance">0.00m</div>
            <button id="retry-button">もう一度！</button>
        </div>

        <div id="key-hints">
            [SPACE]: 発射/ブースト<br>
            [A]/[D]: 姿勢制御(空中)<br>
            [R]: リスタート
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>
