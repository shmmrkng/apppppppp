<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Office Rocket: Technical Speedrun</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Meiryo', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #555; background: #000; }
        canvas { background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); }
        
        /* 詳細説明UI */
        #ui { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.85); padding: 15px; 
            border-radius: 5px; border-left: 5px solid #e74c3c;
            pointer-events: none; width: 260px; font-size: 13px; line-height: 1.5;
        }
        .guide-title { font-weight: bold; color: #e74c3c; margin-bottom: 5px; border-bottom: 1px solid #444; }
        .key { background: #444; padding: 1px 4px; border-radius: 3px; color: #fff; font-size: 11px; border: 1px solid #777; }
        
        .gauge-container { margin: 8px 0; }
        .bar-bg { width: 100%; height: 10px; background: #222; border: 1px solid #444; position: relative; }
        #power-bar { width: 0%; height: 100%; background: #ff4757; transition: width 0.1s; }
        #fuel-bar { width: 100%; height: 100%; background: #1e90ff; }

        #msg { position: absolute; width: 100%; text-align: center; top: 35%; font-size: 32px; font-weight: bold; text-shadow: 3px 3px #000; pointer-events: none; }
        #status-effect { position: absolute; right: 20px; top: 20px; font-size: 24px; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="guide-title">■ 操作マニュアル</div>
        1. <span class="key">Space</span>: <b>角度決定</b> (矢印を止める)<br>
        2. <span class="key">Space長押し</span>: <b>パワー充填</b><br>
        3. <span class="key">Shift</span> or <span class="key">Click</span>: <b>空中噴射</b><br>
        <div class="guide-title" style="color:#f1c40f; margin-top:10px;">■ 秘技: パーフェクトバウンド</div>
        着地直前に <span class="key">Space</span> を押せ！<br>
        成功：速度1.2倍 ＆ 高く跳躍
        
        <div class="gauge-container">
            距離: <span id="dist-val" style="font-size:18px; color:#2ecc71;">0</span>m<br>
            FUEL <div class="bar-bg"><div id="fuel-bar"></div></div>
            POWER <div class="bar-bg"><div id="power-bar"></div></div>
        </div>
    </div>
    
    <div id="status-effect"></div>
    <div id="msg">SPACEで角度決定！</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const powerBar = document.getElementById('power-bar');
const fuelBar = document.getElementById('fuel-bar');
const distVal = document.getElementById('dist-val');
const msgDisplay = document.getElementById('msg');
const effectDisplay = document.getElementById('status-effect');

canvas.width = 900;
canvas.height = 500;

// ゲーム状態: angle(角度選択), power(溜め), flying(飛行中), result(終了)
let gameState = 'angle'; 
let anglePos = 0; // 0 to 1 (sin波用)
let selectedAngle = 0;
let launchPower = 0;
let fuel = 100;
let cameraX = 0;
let distance = 0;

let player = { x: 100, y: 440, vx: 0, vy: 0, rotation: 0 };
const floorY = 460;

// キー状態
const keys = {};
window.addEventListener('keydown', e => {
    if(e.code === 'Space' && !keys['Space']) {
        handleSpaceDown();
    }
    keys[e.code] = true;
});
window.addEventListener('keyup', e => {
    if(e.code === 'Space') handleSpaceUp();
    keys[e.code] = false;
});
window.addEventListener('mousedown', () => keys['Mouse'] = true);
window.addEventListener('mouseup', () => keys['Mouse'] = false);

function handleSpaceDown() {
    if (gameState === 'angle') {
        // 角度決定 -> パワー溜めへ
        selectedAngle = (Math.sin(anglePos) * 60 - 30) * (Math.PI / 180);
        gameState = 'power';
        msgDisplay.innerText = "POWER CHARGE!!";
    } else if (gameState === 'flying') {
        // パーフェクトバウンド判定
        checkBounce();
    } else if (gameState === 'result') {
        resetGame();
    }
}

function handleSpaceUp() {
    if (gameState === 'power') {
        // 発射！
        gameState = 'flying';
        player.vx = Math.cos(selectedAngle) * (launchPower / 4 + 5);
        player.vy = Math.sin(selectedAngle) * (launchPower / 4 + 5);
        msgDisplay.innerText = "";
    }
}

function checkBounce() {
    // 地面から50px以内で落下中なら成功
    if (player.y > floorY - 60 && player.vy > 0) {
        player.vy = -player.vy * 1.3; // 強力反発
        player.vx *= 1.15; // 加速
        showEffect("PERFECT!!", "#f1c40f");
    }
}

function showEffect(txt, color) {
    effectDisplay.innerText = txt;
    effectDisplay.style.color = color;
    setTimeout(() => effectDisplay.innerText = "", 800);
}

function resetGame() {
    gameState = 'angle'; anglePos = 0; launchPower = 0; fuel = 100; cameraX = 0;
    player = { x: 100, y: 440, vx: 0, vy: 0, rotation: 0 };
    msgDisplay.innerText = "SPACEで角度決定！";
}

function update() {
    if (gameState === 'angle') {
        anglePos += 0.05;
        selectedAngle = (Math.sin(anglePos) * 60 - 30) * (Math.PI / 180);
    }
    
    if (gameState === 'power') {
        launchPower = Math.min(launchPower + 2, 100);
        powerBar.style.width = launchPower + '%';
    }

    if (gameState === 'flying') {
        // 重力と空気抵抗
        player.vy += 0.25;
        player.vx *= 0.992;
        player.x += player.vx;
        player.y += player.vy;
        player.rotation += player.vx * 0.05;

        // ブースト
        if ((keys['ShiftLeft'] || keys['Mouse']) && fuel > 0) {
            player.vx += 0.3;
            player.vy -= 0.15;
            fuel -= 1.2;
            showEffect("BOOST", "#3498db");
        }
        fuelBar.style.width = fuel + '%';

        // 着地
        if (player.y > floorY - 20) {
            player.y = floorY - 20;
            player.vy *= -0.4;
            player.vx *= 0.95;
            if (Math.abs(player.vx) < 0.3) {
                gameState = 'result';
                msgDisplay.innerHTML = `記録: ${Math.floor(player.x/10)}m<br><span style="font-size:16px">Spaceでリトライ</span>`;
            }
        }
        cameraX = player.x - 200;
        distVal.innerText = Math.floor(player.x / 10);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(-cameraX, 0);

    // 床の装飾（オフィス風）
    ctx.fillStyle = '#333';
    ctx.fillRect(cameraX, floorY, canvas.width, 40);
    ctx.strokeStyle = '#444';
    for(let i=0; i<20; i++) {
        let lx = Math.floor(cameraX/100)*100 + i*100;
        ctx.strokeRect(lx, floorY, 100, 40);
    }

    // 角度インジケーター（発射前のみ）
    if (gameState === 'angle' || gameState === 'power') {
        ctx.beginPath();
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 4;
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(selectedAngle)*80, player.y + Math.sin(selectedAngle)*80);
        ctx.stroke();
    }

    // プレイヤー
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rotation);
    // 消火器
    ctx.fillStyle = '#e74c3c'; ctx.fillRect(-22, 5, 25, 12);
    // 椅子
    ctx.fillStyle = '#222'; ctx.fillRect(-15, 10, 30, 6);
    ctx.fillRect(-2, 16, 4, 8);
    // 人
    ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(0, -6, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillRect(-10, 6, 20, 10);
    ctx.restore();

    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
