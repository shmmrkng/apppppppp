<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Extreme Office Launch</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        canvas {
            background: linear-gradient(to bottom, #87CEEB 0%, #f5f5f5 100%);
            border-bottom: 10px solid #7f8c8d; /* オフィスの床 */
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }
        .gauge-container {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            margin-top: 5px;
        }
        #power-gauge {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #27ae60, #f1c40f, #e74c3c);
        }
        #msg {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 40%;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div>飛距離: <span id="dist">0</span> m</div>
        <div>最高記録: <span id="best">0</span> m</div>
        <div id="gauge-label">パワーを溜めろ！ (スペース長押し)</div>
        <div class="gauge-container"><div id="power-gauge"></div></div>
    </div>
    <div id="msg">SPACEキー長押しで発射！</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const powerGauge = document.getElementById('power-gauge');
const distDisplay = document.getElementById('dist');
const bestDisplay = document.getElementById('best');
const msgDisplay = document.getElementById('msg');

canvas.width = 800;
canvas.height = 400;

// ゲーム状態
let state = 'ready'; // ready, charging, flying, result
let power = 0;
let angle = -Math.PI / 4; // 固定45度（上向き）
let distance = 0;
let maxDistance = 0;
let cameraX = 0;

// 物理定数
const gravity = 0.25;
const friction = 0.98; // 空力
const bounce = 0.6;  // 床の跳ね返り

let player = {
    x: 100,
    y: 350,
    vx: 0,
    vy: 0,
    radius: 20,
    rotation: 0
};

// 背景の装飾（オフィス家具など）
const decorations = [];
for(let i=0; i<50; i++) {
    decorations.push({
        x: i * 300 + Math.random() * 100,
        type: Math.random() > 0.5 ? 'desk' : 'water'
    });
}

// キー入力
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        if (state === 'ready') {
            state = 'charging';
            msgDisplay.innerText = "溜めて溜めて...！";
        } else if (state === 'result') {
            reset();
        }
    }
});

window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' && state === 'charging') {
        launch();
    }
});

function launch() {
    state = 'flying';
    msgDisplay.innerText = "";
    player.vx = (power / 5) * Math.cos(angle);
    player.vy = (power / 5) * Math.sin(angle);
}

function reset() {
    state = 'ready';
    power = 0;
    cameraX = 0;
    player.x = 100;
    player.y = 350;
    player.vx = 0;
    player.vy = 0;
    player.rotation = 0;
    msgDisplay.innerText = "SPACEキー長押しで発射！";
    powerGauge.style.width = '0%';
}

function update() {
    if (state === 'charging') {
        power += 1.5;
        if (power > 100) power = 100;
        powerGauge.style.width = power + '%';
    }

    if (state === 'flying') {
        player.vy += gravity;
        player.vx *= friction;
        player.x += player.vx;
        player.y += player.vy;
        player.rotation += player.vx * 0.1;

        // 床との判定
        if (player.y + player.radius > 380) {
            player.y = 380 - player.radius;
            player.vy *= -bounce;
            player.vx *= 0.8; // 床摩擦

            // 停止判定
            if (Math.abs(player.vx) < 0.2) {
                state = 'result';
                msgDisplay.innerText = "記録: " + Math.floor(distance) + "m\n(Spaceでリトライ)";
                if (distance > maxDistance) maxDistance = Math.floor(distance);
                bestDisplay.innerText = maxDistance;
            }
        }

        distance = (player.x - 100) / 10;
        distDisplay.innerText = Math.floor(distance);
        
        // カメラ追従
        if (player.x > 400) {
            cameraX = player.x - 400;
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // 床の描画
    ctx.fillStyle = '#95a5a6';
    ctx.fillRect(cameraX, 380, canvas.width, 20);

    // デコレーション（オフィス家具）の描画
    decorations.forEach(d => {
        ctx.fillStyle = d.type === 'desk' ? '#d35400' : '#3498db';
        ctx.fillRect(d.x, 340, 60, 40);
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillText(d.type === 'desk' ? 'Desk' : 'Water', d.x + 10, 360);
    });

    // 飛ばすもの：椅子に座った社員
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rotation);
    
    // 消火器（ブースター）
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(-25, 5, 30, 10);
    
    // 椅子
    ctx.fillStyle = '#333';
    ctx.fillRect(-15, 10, 30, 5); // 座面
    ctx.fillRect(-5, 10, 5, 15);   // 脚

    // 社員（丸で表現）
    ctx.fillStyle = '#f39c12'; // 顔
    ctx.beginPath();
    ctx.arc(0, -5, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff'; // シャツ
    ctx.fillRect(-10, 5, 20, 10);
    
    ctx.restore();

    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
