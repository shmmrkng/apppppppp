<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Office Bomb Run: Chaos Edition</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #333; box-shadow: 0 0 30px #ff450033; }
        canvas { background: #000; }
        
        #ui { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.8); padding: 12px; border: 1px solid #ff4500;
            width: 280px; font-size: 12px; pointer-events: none;
        }
        .guide-title { color: #ff4500; font-weight: bold; margin-bottom: 5px; text-decoration: underline; }
        .key-hint { color: #00ffcc; font-weight: bold; }
        
        #msg { position: absolute; width: 100%; text-align: center; top: 40%; font-size: 30px; font-weight: bold; color: #fff; text-shadow: 0 0 10px #ff4500; pointer-events: none; }
        #dist-ui { position: absolute; right: 20px; top: 20px; font-size: 32px; color: #00ffcc; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="guide-title">MISSION: OFFICE ESCAPE</div>
        [1] <span class="key-hint">Space</span>: 角度決定 & 射出<br>
        [2] <span class="key-hint">Shift</span>: 空中ブースト (燃料消費)<br>
        [3] <span class="key-hint">Space (落下中)</span>: パーフェクトバウンド<br>
        <div class="guide-title" style="color:#ff0000; margin-top:8px;">■ 新機能: 背負い爆弾</div>
        [4] <span class="key-hint">E キー</span>: **起爆(一回限り)**<br>
        <small>回転中の背中の向きに爆風が発生！<br>向きを誤ると地面に激突するぞ。</small>
    </div>
    
    <div id="dist-ui"><span id="dist-val">0</span> m</div>
    <div id="msg">SPACEで角度決定</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const distVal = document.getElementById('dist-val');
const msgDisplay = document.getElementById('msg');

canvas.width = 900;
canvas.height = 500;

let gameState = 'angle'; 
let anglePos = 0;
let selectedAngle = 0;
let launchPower = 0;
let fuel = 100;
let cameraX = 0;
let bombAvailable = true;
let particles = [];

let player = { x: 100, y: 440, vx: 0, vy: 0, rotation: 0, rotVel: 0 };
const floorY = 460;

// 背景（パララックス用）
const stars = Array.from({length: 100}, () => ({x: Math.random()*900, y: Math.random()*400, s: Math.random()*2}));
const buildings = Array.from({length: 20}, (_, i) => ({x: i*200, w: 100+Math.random()*100, h: 100+Math.random()*200}));

window.addEventListener('keydown', e => {
    if(e.code === 'Space' && gameState !== 'power') handleAction();
    if(e.code === 'KeyE') detonateBomb();
    if(e.code === 'Space') keys['Space'] = true;
    if(e.code === 'ShiftLeft') keys['Shift'] = true;
});
window.addEventListener('keyup', e => {
    if(e.code === 'Space') {
        if(gameState === 'power') launch();
        keys['Space'] = false;
    }
    if(e.code === 'ShiftLeft') keys['Shift'] = false;
});

const keys = {};

function handleAction() {
    if (gameState === 'angle') {
        gameState = 'power';
        msgDisplay.innerText = "CHARGE!!";
    } else if (gameState === 'flying') {
        checkBounce();
    } else if (gameState === 'result') {
        location.reload();
    }
}

function launch() {
    gameState = 'flying';
    player.vx = Math.cos(selectedAngle) * (launchPower / 3 + 5);
    player.vy = Math.sin(selectedAngle) * (launchPower / 3 + 5);
    player.rotVel = player.vx * 0.02;
    msgDisplay.innerText = "";
}

function detonateBomb() {
    if (gameState === 'flying' && bombAvailable) {
        bombAvailable = false;
        // 背中の向き（rotation）の逆方向に力を加える
        // プレイヤーのrotationはラジアン。背中の方向 = rotation + PI
        const force = 25;
        player.vx += Math.cos(player.rotation) * force;
        player.vy += Math.sin(player.rotation) * force;
        player.rotVel += 0.5; // 爆発で激しく回転
        
        // 爆発エフェクト
        for(let i=0; i<30; i++) {
            particles.push({
                x: player.x, y: player.y, 
                vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, 
                life: 1, color: '#ff4500'
            });
        }
        msgDisplay.innerText = "KABOOOOM!!";
        setTimeout(()=> { if(gameState==='flying') msgDisplay.innerText=""; }, 1000);
    }
}

function checkBounce() {
    if (player.y > floorY - 60 && player.vy > 0) {
        player.vy = -player.vy * 1.3;
        player.vx *= 1.2;
        msgDisplay.innerText = "PERFECT!";
        setTimeout(()=> { if(gameState==='flying') msgDisplay.innerText=""; }, 500);
    }
}

function update() {
    if (gameState === 'angle') {
        anglePos += 0.06;
        selectedAngle = (Math.sin(anglePos) * 60 - 30) * (Math.PI / 180);
    }
    if (gameState === 'power') {
        launchPower = Math.min(launchPower + 2.5, 100);
    }
    if (gameState === 'flying') {
        player.vy += 0.25;
        player.vx *= 0.995;
        player.x += player.vx;
        player.y += player.vy;
        player.rotation += player.rotVel;

        if (keys['Shift'] && fuel > 0) {
            player.vx += 0.2;
            fuel -= 1;
            particles.push({x: player.x, y: player.y, vx: -5, vy: Math.random(), life: 0.5, color: '#00ccff'});
        }

        if (player.y > floorY - 20) {
            player.y = floorY - 20;
            player.vy *= -0.4;
            player.vx *= 0.9;
            player.rotVel *= 0.5;
            if (Math.abs(player.vx) < 0.5) {
                gameState = 'result';
                msgDisplay.innerHTML = `FINISH: ${Math.floor(player.x/10)}m<br>Spaceで再起動`;
            }
        }
        cameraX = player.x - 200;
        distVal.innerText = Math.floor(player.x / 10);
    }
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景：遠くの星 (ゆっくり動く)
    ctx.fillStyle = "white";
    stars.forEach(s => {
        let sx = (s.x - cameraX * 0.1) % 900;
        if (sx < 0) sx += 900;
        ctx.fillRect(sx, s.y, s.s, s.s);
    });

    // 背景：ビル群 (中速で動く)
    ctx.fillStyle = "#111";
    buildings.forEach((b, i) => {
        let bx = (b.x - cameraX * 0.5) % 2000;
        if (bx < -200) bx += 2000;
        ctx.fillRect(bx, floorY - b.h, b.w, b.h);
        ctx.strokeStyle = "#222";
        ctx.strokeRect(bx, floorY - b.h, b.w, b.h);
    });

    ctx.save();
    ctx.translate(-cameraX, 0);

    // 地面
    ctx.fillStyle = '#111';
    ctx.fillRect(cameraX, floorY, canvas.width, 40);
    ctx.strokeStyle = '#333';
    ctx.beginPath();
    for(let i=0; i<10; i++){
        let lx = Math.floor(cameraX/100)*100 + i*100;
        ctx.moveTo(lx, floorY); ctx.lineTo(lx, floorY+40);
    }
    ctx.stroke();

    // プレイヤーと爆弾
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rotation);
    
    // 爆弾 (背中)
    if(bombAvailable) {
        ctx.fillStyle = '#ff0000';
        ctx.beginPath(); ctx.arc(-15, 0, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'black'; ctx.fillRect(-15, -10, 2, 4); // 導火線
    }

    // 椅子
    ctx.fillStyle = '#444'; ctx.fillRect(-15, 8, 30, 5);
    // 人
    ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(0, -5, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'blue'; ctx.fillRect(-8, 5, 16, 10);
    ctx.restore();

    // エフェクト
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
